<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mi Rutina — Avanzados</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #c8f56a;
    --accent-dim: rgba(200,245,106,0.12);
    --red: #ff6b6b;
    --blue: #6bb8ff;
    --amber: #ffc46b;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    max-width: 440px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  /* TOP BAR */
  .topbar {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 12px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .cycle-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  .cycle-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* WEEK/DAY SELECTOR */
  .selector-section {
    padding: 16px 16px 0;
  }
  .selector-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .pills-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .pills-row::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--bg3);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill.active {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* SESSION HEADER */
  .session-header {
    padding: 20px 16px 12px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .session-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .session-meta { font-size: 13px; color: var(--text2); }

  /* CYCLE PHASE BANNER */
  .phase-banner {
    margin: 0 16px 16px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .phase-banner.folicular { background: rgba(107,184,255,0.12); color: var(--blue); border: 0.5px solid rgba(107,184,255,0.3); }
  .phase-banner.ovulacion { background: rgba(200,245,106,0.12); color: var(--accent); border: 0.5px solid rgba(200,245,106,0.3); }
  .phase-banner.lutea { background: rgba(255,196,107,0.12); color: var(--amber); border: 0.5px solid rgba(255,196,107,0.3); }
  .phase-banner.menstrual { background: rgba(255,107,107,0.12); color: var(--red); border: 0.5px solid rgba(255,107,107,0.3); }

  /* BLOCK */
  .block {
    margin: 0 16px 12px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .block-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .block-tag {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .block-name { font-size: 13px; color: var(--text2); }

  /* EXERCISE CARD */
  .exercise {
    padding: 12px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .exercise:last-child { border-bottom: none; }
  .ex-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .ex-name { font-size: 15px; font-weight: 500; line-height: 1.3; flex: 1; }
  .ex-image {
    width: 52px; height: 52px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border: 0.5px solid var(--border);
  }
  .ex-image svg { width: 32px; height: 32px; opacity: 0.5; }
  .ex-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    color: var(--text2);
    background: var(--bg3);
  }
  .chip.series { color: var(--accent); border-color: rgba(200,245,106,0.3); background: var(--accent-dim); }

  /* WEIGHT INPUT */
  .weight-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }
  .weight-label { font-size: 12px; color: var(--text3); flex: 1; }
  .weight-controls { display: flex; align-items: center; gap: 6px; }
  .weight-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .weight-btn:active { background: var(--bg); }
  .weight-val {
    font-size: 15px;
    font-weight: 600;
    min-width: 60px;
    text-align: center;
    color: var(--text);
  }
  .weight-unit { font-size: 12px; color: var(--text3); }
  .weight-saved { color: var(--accent); font-size: 11px; }

  /* CARDIO BLOCK */
  .cardio-card {
    margin: 0 16px 12px;
    padding: 14px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cardio-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    background: rgba(200,245,106,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .cardio-info { flex: 1; }
  .cardio-name { font-size: 14px; font-weight: 500; }
  .cardio-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-width: 440px;
  }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .phase-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .phase-opt {
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .phase-opt.selected { border-width: 1.5px; }
  .phase-opt.folicular.selected { border-color: var(--blue); background: rgba(107,184,255,0.1); color: var(--blue); }
  .phase-opt.ovulacion.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .phase-opt.lutea.selected { border-color: var(--amber); background: rgba(255,196,107,0.1); color: var(--amber); }
  .phase-opt.menstrual.selected { border-color: var(--red); background: rgba(255,107,107,0.1); color: var(--red); }
  .phase-opt-name { font-size: 14px; font-weight: 500; }
  .phase-opt-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .phase-opt.selected .phase-opt-hint { opacity: 0.8; }
  .modal-close {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 14px;
    cursor: pointer;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    border-top: 0.5px solid var(--border);
    padding: 12px 20px 20px;
    display: flex;
    justify-content: space-around;
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    padding: 0 12px;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* PROGRESS BAR */
  .progress-section { padding: 12px 16px 4px; }
  .progress-bar-bg {
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); }

  .divider { height: 0.5px; background: var(--border); margin: 4px 16px; }

  /* HISTORY VIEW */
  .history-section { padding: 0 16px; }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .history-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
  }
  .history-ex-name { font-size: 14px; font-weight: 500; }
  .history-weights { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .history-weight-tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text2);
    border: 0.5px solid var(--border);
  }
  .history-weight-tag span { color: var(--accent); font-weight: 600; }

  /* Utility */
  .hidden { display: none !important; }
  .section-gap { height: 8px; }
</style>
</head>

const PHASE_DATA = {
  folicular: { label: 'Fase folicular · Más energía para entrenar 💪', dot:'#6bb8ff' },
  ovulacion: { label: 'Ovulación · Pico de energía y fuerza 🔥', dot:'#c8f56a' },
  lutea: { label: 'Fase lútea · Moderá la intensidad si es necesario 🌙', dot:'#ffc46b' },
  menstrual: { label: 'Menstruación · Escuchá tu cuerpo ❤️', dot:'#ff6b6b' },
};

let currentWeek = 1;
let currentDay = 1;
let currentPhase = null;
let weights = {};
let currentView = 'workout';

function storageKey(exName, week, day) {
  return `w${week}d${day}_${exName.replace(/\s+/g,'_')}`;
}

function loadWeights() {
  try { weights = JSON.parse(localStorage.getItem('gym_weights') || '{}'); } catch(e) { weights = {}; }
}
function saveWeights() {
  try { localStorage.setItem('gym_weights', JSON.stringify(weights)); } catch(e) {}
}
function loadPhase() {
  try { currentPhase = localStorage.getItem('gym_phase') || null; } catch(e) {}
}
function savePhase() {
  try { if(currentPhase) localStorage.setItem('gym_phase', currentPhase); else localStorage.removeItem('gym_phase'); } catch(e) {}
}

function getWeight(exName) {
  const k = storageKey(exName, currentWeek, currentDay);
  return weights[k] || 0;
}
function setWeight(exName, val) {
  const k = storageKey(exName, currentWeek, currentDay);
  weights[k] = val;
  saveWeights();
}

function renderWeekPills() {
  const el = document.getElementById('week-pills');
  el.innerHTML = '';
  for (let w = 1; w <= 5; w++) {
    const p = document.createElement('div');
    p.className = 'pill' + (w === currentWeek ? ' active' : '');
    p.textContent = 'Semana ' + w;
    p.onclick = () => { currentWeek = w; renderAll(); };
    el.appendChild(p);
  }
}

function renderDayPills() {
  const el = document.getElementById('day-pills');
  el.innerHTML = '';
  for (let d = 1; d <= 3; d++) {
    const p = document.createElement('div');
    p.className = 'pill' + (d === currentDay ? ' active' : '');
    p.textContent = 'Día ' + d;
    p.onclick = () => { currentDay = d; renderAll(); };
    el.appendChild(p);
  }
}

function renderPhase() {
  const banner = document.getElementById('phase-banner');
  const dot = document.getElementById('cycle-dot');
  const label = document.getElementById('cycle-label');
  if (currentPhase && PHASE_DATA[currentPhase]) {
    const pd = PHASE_DATA[currentPhase];
    banner.className = 'phase-banner ' + currentPhase;
    document.getElementById('phase-banner-text').textContent = pd.label;
    banner.classList.remove('hidden');
    dot.style.background = pd.dot;
    const names = {folicular:'Folicular', ovulacion:'Ovulación', lutea:'Lútea', menstrual:'Menstrual'};
    label.textContent = names[currentPhase];
    document.querySelectorAll('.phase-opt').forEach(el => {
      el.classList.remove('selected');
      if (el.classList.contains(currentPhase)) el.classList.add('selected');
    });
  } else {
    banner.classList.add('hidden');
    dot.style.background = '#666';
    label.textContent = 'Ciclo';
  }
}

function countLoaded(week, day) {
  const session = ROUTINE[week][day];
  if (!session) return { loaded: 0, total: 0 };
  let total = 0, loaded = 0;
  session.blocks.forEach(b => b.exercises.forEach(ex => {
    total++;
    if (getExerciseWeight(ex.name, week, day) > 0) loaded++;
  }));
  return { loaded, total };
}

function getExerciseWeight(exName, w, d) {
  const k = storageKey(exName, w, d);
  return weights[k] || 0;
}

function renderProgress() {
  const { loaded, total } = countLoaded(currentWeek, currentDay);
  const pct = total > 0 ? Math.round(loaded / total * 100) : 0;
  document.getElementById('progress-text').textContent = `${loaded} de ${total} ejercicios con peso`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

function renderRoutine() {
  const content = document.getElementById('routine-content');
  content.innerHTML = '';
  const session = ROUTINE[currentWeek] && ROUTINE[currentWeek][currentDay];
  if (!session) return;

  document.getElementById('topbar-sub').textContent = `Semana ${currentWeek} · Día ${currentDay}`;
  document.getElementById('session-header-title') && (document.getElementById('session-header-title').textContent = `Semana ${currentWeek} · Día ${currentDay}`);

  session.blocks.forEach(block => {
    const blockEl = document.createElement('div');
    blockEl.className = 'block';

    const header = document.createElement('div');
    header.className = 'block-header';
    header.innerHTML = `<div class="block-tag">${block.tag}</div><div class="block-name">${block.exercises.map(e=>e.musculos).filter((v,i,a)=>a.indexOf(v)===i).join(' · ')}</div>`;
    blockEl.appendChild(header);

    block.exercises.forEach(ex => {
      const exEl = document.createElement('div');
      exEl.className = 'exercise';

      const icon = EXERCISE_ICONS[ex.tipo] || EXERCISE_ICONS.compound;
      const weight = getWeight(ex.name);

      exEl.innerHTML = `
        <div class="ex-top">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-image">${icon}</div>
        </div>
        <div class="ex-chips">
          <div class="chip series">${ex.series} series</div>
          <div class="chip">${ex.reps} reps</div>
          <div class="chip">1-3 min desc</div>
        </div>
        <div class="weight-row">
          <div class="weight-label">Peso usado</div>
          <div class="weight-controls">
            <button class="weight-btn" onclick="adjustWeight('${ex.name}', -2.5)">−</button>
            <div class="weight-val" id="wval-${CSS.escape(ex.name)}">${weight > 0 ? weight + ' kg' : '— kg'}</div>
            <button class="weight-btn" onclick="adjustWeight('${ex.name}', 2.5)">+</button>
          </div>
        </div>
      `;
      blockEl.appendChild(exEl);
    });

    content.appendChild(blockEl);
  });

  if (session.cardio) {
    const cardioEl = document.createElement('div');
    cardioEl.className = 'cardio-card';
    cardioEl.innerHTML = `
      <div class="cardio-icon">${session.cardio.icono}</div>
      <div class="cardio-info">
        <div class="cardio-name">${session.cardio.name}</div>
        <div class="cardio-meta">${session.cardio.duracion}</div>
      </div>
    `;
    content.appendChild(cardioEl);
  }
}

function adjustWeight(exName, delta) {
  let current = getWeight(exName);
  let newVal = Math.max(0, Math.round((current + delta) * 10) / 10);
  setWeight(exName, newVal);
  const el = document.getElementById('wval-' + CSS.escape(exName));
  if (el) el.textContent = newVal > 0 ? newVal + ' kg' : '— kg';
  renderProgress();
}

function renderAll() {
  renderWeekPills();
  renderDayPills();
  renderPhase();
  renderProgress();
  renderRoutine();
}

function renderHistory() {
  const container = document.getElementById('history-content');
  container.innerHTML = '';
  
  const allEntries = [];
  for (const key in weights) {
    if (weights[key] > 0) {
      const match = key.match(/^w(\d)d(\d)_(.+)$/);
      if (match) {
        const w = match[1], d = match[2], name = match[3].replace(/_/g,' ');
        allEntries.push({ week: w, day: d, name, weight: weights[key], key });
      }
    }
  }

  if (allEntries.length === 0) {
    container.innerHTML = '<div class="history-empty">Todavía no hay pesos guardados.<br>Empezá a cargar tus pesos en la rutina.</div>';
    return;
  }

  const grouped = {};
  allEntries.forEach(e => {
    if (!grouped[e.name]) grouped[e.name] = [];
    grouped[e.name].push(e);
  });

  Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([name, entries]) => {
    const card = document.createElement('div');
    card.className = 'history-card';
    const tagsHtml = entries.map(e => `<div class="history-weight-tag">S${e.week}D${e.day} <span>${e.weight} kg</span></div>`).join('');
    card.innerHTML = `<div class="history-ex-name">${name}</div><div class="history-weights">${tagsHtml}</div>`;
    container.appendChild(card);
  });
}

function switchView(view) {
  currentView = view;
  document.getElementById('view-workout').classList.toggle('hidden', view !== 'workout');
  document.getElementById('view-history').classList.toggle('hidden', view !== 'history');
  document.getElementById('nav-workout').classList.toggle('active', view === 'workout');
  document.getElementById('nav-history').classList.toggle('active', view === 'history');
  if (view === 'history') renderHistory();
}

function openCycleModal() {
  document.getElementById('cycle-modal').classList.add('open');
}
function closeCycleModal() {
  document.getElementById('cycle-modal').classList.remove('open');
}
function setPhase(phase) {
  currentPhase = phase;
  savePhase();
  renderPhase();
  closeCycleModal();
}

document.getElementById('cycle-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCycleModal();
});

loadWeights();
loadPhase();
renderAll();
</script>
</body>
</html>
